services:
  web:
    build:
      context: .
      target: runner
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
