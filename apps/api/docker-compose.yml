services:
  api:
    build:
      context: .
      target: production
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:${PORT:-3000}/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
